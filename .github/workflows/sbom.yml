name: Generate SBOM

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

env:
  PRODUCT_NAME: NuvoISP
  PRODUCT_SUPPLIER: "Nuvoton Technology Corporation"
  NAMESPACE_BASE_URI: "https://www.nuvoton.com/sbom"

  SOLUTION_PATH: "NuvoISP/NuvoISP_VS2019.sln"
  BUILD_CONFIGURATION: "Release"
  BUILD_PLATFORM: "Win32"

  # MSBuild output folder that contains NuvoISP.exe.
  MSBUILD_OUTPUT_PATH: "NuvoISP/Release"

  # Staged release/drop folder used by Microsoft SBOM Tool.
  # This should contain only files intended for distribution.
  BUILD_DROP_PATH: "artifacts/NuvoISP"

  # Source/component path scanned by Microsoft SBOM Tool.
  BUILD_COMPONENTS_PATH: "NuvoISP"

  # Validation output folder and file.
  VALIDATION_OUTPUT_DIR: "artifacts/sbom-validation"
  VALIDATION_OUTPUT_PATH: "artifacts/sbom-validation/sbom-validation.json"

  SPDX_FORMAT: "SPDX:2.2"
  SBOM_TOOL_VERSION: "v4.1.5"

jobs:
  generate-sbom:
    name: Generate and validate SBOM
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Preflight repository files
        shell: pwsh
        run: |
          $requiredFiles = @(
            "$env:SOLUTION_PATH",
            "sbom/third-party-components.yml",
            "scripts/update-sbom-manual-components.ps1"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              Write-Error "Required file not found: $file"
            }
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Determine product version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "0.0.0-${{ github.run_number }}"
          }

          "PRODUCT_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build NuvoISP
        shell: pwsh
        run: |
          msbuild "$env:SOLUTION_PATH" `
            /m `
            /p:Configuration="$env:BUILD_CONFIGURATION" `
            /p:Platform="$env:BUILD_PLATFORM"

      - name: Stage distributable files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path "$env:BUILD_DROP_PATH") {
            Remove-Item "$env:BUILD_DROP_PATH" -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path "$env:BUILD_DROP_PATH" | Out-Null

          $mainExe = Join-Path "$env:MSBUILD_OUTPUT_PATH" "NuvoISP.exe"
          if (-not (Test-Path $mainExe)) {
            Write-Error "NuvoISP.exe not found: $mainExe"
          }

          Copy-Item $mainExe "$env:BUILD_DROP_PATH" -Force

          # Internal Nuvoton runtime files. These are not third-party components,
          # but if they are distributed with NuvoISP, they should be present in
          # the build drop so SBOM Tool can list them as files.
          $runtimeFiles = @(
            "NuvoISP/GetChipInformation.dll",
            "NuvoISP/offline_isp_file_converter.exe"
          )

          foreach ($file in $runtimeFiles) {
            if (Test-Path $file) {
              Copy-Item $file "$env:BUILD_DROP_PATH" -Force
              Write-Host "Staged runtime file: $file"
            } else {
              Write-Warning "Runtime file not found and not staged: $file"
            }
          }

          Write-Host "Final staged build drop:"
          Get-ChildItem "$env:BUILD_DROP_PATH" -Force

      - name: Download Microsoft SBOM Tool
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          New-Item -ItemType Directory -Force -Path ".tools" | Out-Null

          $toolUrl = "https://github.com/microsoft/sbom-tool/releases/download/$env:SBOM_TOOL_VERSION/sbom-tool-win-x64.exe"
          $toolPath = ".tools/sbom-tool-win-x64.exe"

          Invoke-WebRequest -Uri $toolUrl -OutFile $toolPath

          if (-not (Test-Path $toolPath)) {
            Write-Error "SBOM Tool download failed: $toolPath"
          }

          Write-Host "Downloaded Microsoft SBOM Tool: $toolUrl"

      - name: Generate base SBOM
        shell: pwsh
        run: |
          .\.tools\sbom-tool-win-x64.exe generate `
            -b "$env:BUILD_DROP_PATH" `
            -bc "$env:BUILD_COMPONENTS_PATH" `
            -pn "$env:PRODUCT_NAME" `
            -pv "$env:PRODUCT_VERSION" `
            -ps "$env:PRODUCT_SUPPLIER" `
            -nsb "$env:NAMESPACE_BASE_URI" `
            -mi "$env:SPDX_FORMAT"

      - name: Add manually confirmed third-party components
        shell: pwsh
        run: |
          $manifest = Join-Path "$env:BUILD_DROP_PATH" "_manifest/spdx_2.2/manifest.spdx.json"

          .\scripts\update-sbom-manual-components.ps1 `
            -ManifestPath $manifest `
            -ComponentsPath "sbom/third-party-components.yml"

      - name: Recalculate manifest SHA-256
        shell: pwsh
        run: |
          $manifest = Join-Path "$env:BUILD_DROP_PATH" "_manifest/spdx_2.2/manifest.spdx.json"

          if (-not (Test-Path $manifest)) {
            Write-Error "Manifest not found: $manifest"
          }

          (Get-FileHash $manifest -Algorithm SHA256).Hash.ToLower() |
            Set-Content "$manifest.sha256" -NoNewline -Encoding utf8

          Write-Host "Updated $manifest.sha256"

      - name: Validate SBOM
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VALIDATION_OUTPUT_DIR" | Out-Null

          .\.tools\sbom-tool-win-x64.exe validate `
            -b "$env:BUILD_DROP_PATH" `
            -o "$env:VALIDATION_OUTPUT_PATH" `
            -mi "$env:SPDX_FORMAT"

          if (-not (Test-Path "$env:VALIDATION_OUTPUT_PATH")) {
            Write-Error "SBOM validation output was not created: $env:VALIDATION_OUTPUT_PATH"
          }

      - name: Verify final SBOM outputs
        shell: pwsh
        run: |
          $outputs = @(
            "$env:BUILD_DROP_PATH/_manifest/spdx_2.2/manifest.spdx.json",
            "$env:BUILD_DROP_PATH/_manifest/spdx_2.2/manifest.spdx.json.sha256",
            "$env:VALIDATION_OUTPUT_PATH"
          )

          foreach ($file in $outputs) {
            if (-not (Test-Path $file)) {
              Write-Error "Expected output not found: $file"
            }
            Write-Host "Verified output: $file"
          }

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NuvoISP-SBOM-${{ env.PRODUCT_VERSION }}
          if-no-files-found: error
          path: |
            ${{ env.BUILD_DROP_PATH }}/_manifest/spdx_2.2/manifest.spdx.json
            ${{ env.BUILD_DROP_PATH }}/_manifest/spdx_2.2/manifest.spdx.json.sha256
            ${{ env.VALIDATION_OUTPUT_PATH }}
            sbom/third-party-components.yml
