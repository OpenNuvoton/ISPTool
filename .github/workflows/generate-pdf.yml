name: Generate ISP Documentation PDF

on:
  push:
    tags:
      - 'v*'
    branches: [ master, main ]
    paths:
      - 'Documents/**/*.md'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - doc_dir: NuMicro_ISP_Programming_Guide
            doc_file: NuMicro_ISP_Programming_Guide.md
            pdf_name: NuMicro_ISP_Programming_Guide
            cover_line1: "NuMicro ISP Protocol —"
            cover_line2: "Developer Programming Guide"
          - doc_dir: NuMicro_ISP_Programming_User_Manual
            doc_file: NuMicro_ISP_Programming_User_Manual.md
            pdf_name: NuMicro_ISP_Programming_User_Manual
            cover_line1: "NuMicro ISP Programming Tool —"
            cover_line2: "User Manual"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Get Latest v-Tag
        id: get_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No matching v-tag found"
            echo "HAS_TAG=false" >> $GITHUB_ENV
          else
            echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
            echo "HAS_TAG=true" >> $GITHUB_ENV
          fi

      - name: Cache APT Packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-texlive-v1

      - name: Install Pandoc & LaTeX & Fonts
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y tzdata pandoc texlive-xetex texlive-fonts-recommended texlive-lang-chinese
          sudo apt-get install -y fonts-noto-cjk fonts-dejavu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm install -g @mermaid-js/mermaid-cli
          echo '{"executablePath":"/usr/bin/google-chrome-stable","args":["--no-sandbox","--disable-setuid-sandbox"]}' > /tmp/puppeteer-config.json

      - name: Prepare cover page
        run: |
          cd Documents
          sed -e 's|@@LINE1@@|${{ matrix.cover_line1 }}|' -e 's|@@LINE2@@|${{ matrix.cover_line2 }}|' cover.tex > cover_${{ matrix.doc_dir }}.tex

      - name: Convert with Pandoc
        run: |
          FILTER="$GITHUB_WORKSPACE/Documents/mermaid-filter.lua"
          cd Documents/${{ matrix.doc_dir }}
          sed -E 's|\./media|'"$PWD"'/media|g' ${{ matrix.doc_file }} | \
            sed 's/^# /\\newpage\n\n# /' | \
            sed 's/!\[/\n\n![/g' | \
            pandoc -o ../../${{ matrix.pdf_name }}.pdf \
              --pdf-engine=xelatex \
              -V mainfont="DejaVu Sans" \
              -V CJKmainfont="Noto Sans CJK TC" \
              -V geometry:margin=1in \
              --toc --toc-depth=3 --number-sections \
              --resource-path=.:.. \
              --lua-filter="$FILTER" \
              --include-before-body=../cover_${{ matrix.doc_dir }}.tex \
              --include-in-header=../header.tex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pdf_name }}
          path: ${{ matrix.pdf_name }}.pdf

      - name: Attach PDF to Release
        if: env.HAS_TAG == 'true'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: ${{ env.LATEST_TAG }}
          artifacts: "${{ matrix.pdf_name }}.pdf"
          omitName: true
          omitBody: true          
